<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Institute of Modern Technology - Maintenance Page</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            animation: {
              "spin-slow": "spin 4s linear infinite",
              blob: "blob 7s infinite",
            },
            keyframes: {
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" },
              },
            },
          },
        },
      };
    </script>

    <style>
      body {
        background-color: #0f172a;
        overflow: hidden;
      }

      /* Glassmorphism utility */
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .gradient-text {
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center font-sans text-slate-200 relative"
  >
    <!-- Animated Background Blobs -->
    <div
      class="absolute top-0 -left-4 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 animate-blob"
    ></div>
    <div
      class="absolute top-0 -right-4 w-72 h-72 bg-sky-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 animate-blob animation-delay-2000"
    ></div>
    <div
      class="absolute -bottom-8 left-20 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 animate-blob animation-delay-4000"
    ></div>

    <!-- Main Content Card -->
    <main
      class="glass max-w-lg w-full mx-4 p-8 sm:p-12 rounded-3xl shadow-2xl relative z-10 text-center flex flex-col items-center transform transition-all duration-500 hover:scale-[1.01]"
    >
      <!-- Animated Icon -->
      <div class="relative w-24 h-24 mb-6 flex justify-center items-center">
        <div
          class="absolute inset-0 bg-blue-500 rounded-full opacity-20 blur-xl animate-pulse"
        ></div>
        <svg
          class="w-16 h-16 text-sky-400 animate-spin-slow relative z-10"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          ></path>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>
        </svg>
      </div>

      <h1 class="text-3xl sm:text-4xl font-bold mb-4 tracking-tight">
        Coming <span class="gradient-text">Soon</span>
      </h1>

      <p class="text-slate-400 mb-4 leading-relaxed">
        We're building something amazing! Our new website is currently under
        construction and will be launching soon. Stay tuned!
      </p>

      <!-- Redirect Button -->
      <a
        href="https://scholarship.imtec.in/"
        class="mt-6 inline-flex items-center justify-center px-6 py-3 text-sm font-medium text-slate-200 transition-all duration-300 bg-slate-800/50 border border-slate-700 rounded-xl hover:bg-slate-700 hover:text-white hover:scale-105 shadow-lg"
      >
        Go to scholarship Website
        <svg
          class="w-4 h-4 ml-2"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M14 5l7 7m0 0l-7 7m7-7H3"
          ></path>
        </svg>
      </a>
    </main>
  </body>
</html>
